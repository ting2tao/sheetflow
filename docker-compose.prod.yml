services:
  backend:
    image: ghcr.io/ting2tao/sheetflow-backend:${IMAGE_TAG:-latest}
    container_name: sheetflow-backend
    restart: always
    ports:
      - "8010:8000"
    volumes:
      - ${DATA_DIR:-/root/sheetflow-data}:/app/storage
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: ghcr.io/ting2tao/sheetflow-frontend:${IMAGE_TAG:-latest}
    container_name: sheetflow-frontend
    restart: always
    ports:
      - "3010:80"
    depends_on:
      - backend
